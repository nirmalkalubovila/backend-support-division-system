name: Backend CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-check:
    name: ESLint Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run ESLint Check
        run: npm run lint
